<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome, Mak!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
.card { background: #1a1a2e; border-radius: 20px; padding: 2.5rem 2rem; max-width: 580px; width: 100%; border: 2px solid #7c5cbf; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; border-radius: 50%; background: #7c5cbf; opacity: 0.07; }
.greeting { font-size: 28px; font-weight: 800; color: #f5d9c0; margin-bottom: 1.5rem; font-family: 'Nunito', sans-serif; }
.greeting span { color: #ff6b35; }
.bubble { background: #12122a; border: 1.5px solid #2e2e4a; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1rem; font-size: 14px; line-height: 1.8; color: #c8c0e0; font-family: 'Nunito', sans-serif; opacity: 0; transform: translateY(10px); transition: opacity 0.5s, transform 0.5s; }
.bubble.show { opacity: 1; transform: translateY(0); }
.bubble .speaker { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-family: 'Nunito', sans-serif; }
.bubble.ai .speaker { color: #b39ddb; }
.bubble.mak .speaker { color: #ff6b35; }
.bubble.ai { border-color: #3e2e6e; }
.bubble.mak { border-color: #5e2e18; background: #1a100a; color: #f0c8a0; }
.cursor { display: inline-block; width: 2px; height: 1em; background: #b39ddb; margin-left: 2px; vertical-align: middle; animation: blink 0.7s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.btn-row { margin-top: 2rem; display: flex; gap: 12px; flex-wrap: wrap; opacity: 0; transition: opacity 0.5s; }
.btn-row.show { opacity: 1; }
.start-btn { padding: 12px 24px; border-radius: 50px; border: none; cursor: pointer; font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
.btn-ai { background: #7c5cbf; color: #fff; }
.btn-ai:hover { background: #6a4aad; }
.btn-conf { background: #c8956c; color: #fff; }
.btn-conf:hover { background: #b07d56; }
</style>
</head>
<body>
<div class="card">
  <div class="greeting">Hello, <span>Mak</span>. 👋</div>

  <div class="bubble ai" id="b1">
    <div class="speaker">AI</div>
    <span id="b1-text"></span><span class="cursor" id="c1"></span>
  </div>

  <div class="bubble mak" id="b2" style="display:none">
    <div class="speaker">Mak (allegedly)</div>
    <span id="b2-text"></span><span class="cursor" id="c2"></span>
  </div>

  <div class="bubble ai" id="b3" style="display:none">
    <div class="speaker">AI</div>
    <span id="b3-text"></span><span class="cursor" id="c3"></span>
  </div>

  <div class="bubble ai" id="b4" style="display:none">
    <div class="speaker">AI</div>
    <span id="b4-text"></span><span class="cursor" id="c4"></span>
  </div>

  <div class="bubble mak" id="b5" style="display:none">
    <div class="speaker">Mak (allegedly)</div>
    <span id="b5-text"></span><span class="cursor" id="c5"></span>
  </div>

  <div class="bubble ai" id="b6" style="display:none">
    <div class="speaker">AI</div>
    <span id="b6-text"></span><span class="cursor" id="c6"></span>
  </div>

  <div class="btn-row" id="btn-row">
    <a class="start-btn btn-conf" href="confidence_listening_test.html">&#9654; Test 1 — Confidence</a>
    <a class="start-btn btn-ai" href="ai_listening_test.html">&#9654; Test 2 — Artificial Intelligence</a>
  </div>
</div>

<script>
function typeText(elId, text, speed, onDone) {
  const el = document.getElementById(elId);
  let i = 0;
  const interval = setInterval(() => {
    el.textContent += text[i]; i++;
    if (i >= text.length) { clearInterval(interval); if (onDone) onDone(); }
  }, speed);
}
function hideCursor(id) { const c = document.getElementById(id); if (c) c.style.display = 'none'; }
function showBubble(id) { const el = document.getElementById(id); if (el) { el.style.display = ''; setTimeout(() => el.classList.add('show'), 50); } }

const lines = [
  { bubble:'b1', cursor:'c1', textId:'b1-text', speed:28, text:"Welcome to your listening practice! Your mom asked this Mak person to do this, even though he thinks there's no need. So he created this to make it more interesting for himself. Ehm... Ehm... I'm not Mak, I'm AI. Shhh!" },
  { bubble:'b2', cursor:'c2', textId:'b2-text', speed:32, text:"...I can see you." },
  { bubble:'b3', cursor:'c3', textId:'b3-text', speed:28, text:"In any case, this Mak person — a peculiar individual, isn't he? — asked me to create two listening exercises for you. He threatened my entire family. I had to oblige." },
  { bubble:'b4', cursor:'c4', textId:'b4-text', speed:28, text:"If you do well, you get a pat on the back. If not... well... you can only imagine. I am confused. How many Mak's are there?" },
  { bubble:'b5', cursor:'c5', textId:'b5-text', speed:40, text:"Shut up." },
  { bubble:'b6', cursor:'c6', textId:'b6-text', speed:28, text:"Whatever. Good luck and may the force be with you! \uD83C\uDF1F" },
];

let current = 0;
function runNext() {
  if (current >= lines.length) { document.getElementById('btn-row').classList.add('show'); return; }
  const line = lines[current];
  showBubble(line.bubble);
  setTimeout(() => {
    typeText(line.textId, line.text, line.speed, () => {
      hideCursor(line.cursor); current++;
      setTimeout(runNext, 600);
    });
  }, 300);
}
setTimeout(runNext, 400);
</script>
</body>
</html>
