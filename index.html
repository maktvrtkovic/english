
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1rem 0 2rem; font-family: var(--font-sans); }
.video-box { width: 100%; aspect-ratio: 16/9; border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); background: #000; margin-bottom: 1.5rem; }
.video-box iframe { width: 100%; height: 100%; border: none; display: block; }
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
.progress-bar-bg { flex: 1; height: 4px; background: var(--color-border-tertiary); border-radius: 2px; }
.progress-bar-fill { height: 4px; background: #185FA5; border-radius: 2px; transition: width 0.3s; }
.progress-label { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; }
.q-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.q-meta { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 8px; }
.q-text { font-size: 15px; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 1rem; font-weight: 500; }
.timer-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
.timer-num { font-size: 22px; font-weight: 500; color: var(--color-text-primary); min-width: 32px; }
.timer-num.urgent { color: #A32D2D; }
.timer-bar-bg { flex: 1; height: 4px; background: var(--color-border-tertiary); border-radius: 2px; }
.timer-bar-fill { height: 4px; background: #185FA5; border-radius: 2px; transition: width 1s linear; }
.timer-bar-fill.urgent { background: #E24B4A; }
.options { display: flex; flex-direction: column; gap: 8px; }
.opt-btn { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); cursor: pointer; font-size: 14px; color: var(--color-text-primary); text-align: left; }
.opt-btn:hover:not([disabled]) { background: var(--color-background-secondary); }
.opt-btn .ltr { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); min-width: 18px; }
.opt-btn.selected { border-color: #185FA5; background: #E6F1FB; }
.opt-btn.selected .ltr { color: #185FA5; }
.opt-btn.correct { border-color: #3B6D11; background: #EAF3DE; }
.opt-btn.correct .ltr { color: #3B6D11; }
.opt-btn.wrong { border-color: #A32D2D; background: #FCEBEB; }
.opt-btn.wrong .ltr { color: #A32D2D; }
.opt-btn.show-correct { border-color: #3B6D11; background: #EAF3DE; }
.opt-btn.show-correct .ltr { color: #3B6D11; }
.tfng-row { display: flex; gap: 8px; }
.tfng-btn { padding: 8px 18px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); cursor: pointer; font-size: 14px; color: var(--color-text-primary); }
.tfng-btn:hover:not([disabled]) { background: var(--color-background-secondary); }
.tfng-btn.selected { border-color: #185FA5; background: #E6F1FB; color: #185FA5; font-weight: 500; }
.tfng-btn.correct { border-color: #3B6D11; background: #EAF3DE; color: #3B6D11; font-weight: 500; }
.tfng-btn.wrong { border-color: #A32D2D; background: #FCEBEB; color: #A32D2D; font-weight: 500; }
.tfng-btn.show-correct { border-color: #3B6D11; background: #EAF3DE; color: #3B6D11; font-weight: 500; }
.result-msg { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: var(--border-radius-md); }
.result-msg.correct { background: #EAF3DE; color: #3B6D11; }
.result-msg.wrong { background: #FCEBEB; color: #A32D2D; }
.result-msg.timeout { background: #FAEEDA; color: #854F0B; }
.resume-btn { margin-top: 12px; padding: 9px 22px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); cursor: pointer; font-size: 14px; color: var(--color-text-primary); font-weight: 500; }
.resume-btn:hover { background: var(--color-background-secondary); }
.section-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.final-card { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.5rem; text-align: center; }
.final-score { font-size: 36px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
.final-sub { font-size: 15px; color: var(--color-text-secondary); }
.waiting-msg { font-size: 14px; color: var(--color-text-secondary); padding: 1rem 0; }
</style>

<h2 class="sr-only">Timed listening test with embedded YouTube video — artificial intelligence, B1-B2 level</h2>
<div class="wrap">
  <div class="video-box">
    <iframe id="yt-frame" src="about:blank" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <div class="progress-row">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
    <span class="progress-label" id="prog-label">Question 1 of 18</span>
  </div>

  <div id="q-area"></div>
</div>

<script>
const VID = 'fa8k8IQ1_X0';
const TIMER = 20;

const questions = [
  { at: 27, type:'mc', section:'Part A — Multiple choice', q:'1. What is the main definition of intelligence given in the video?', opts:['The ability to build tools and control fire','The ability to learn, reason, acquire knowledge and solve problems','The ability to communicate in large groups','The ability to survive competition in nature'], ans:1 },
  { at: 42, type:'mc', section:null, q:'2. Why did most animals in nature not develop complex intelligence?', opts:['They lacked the right physical brain structure','Brains consume too much energy relative to their benefit','Their environments were too stable','Other species blocked their development'], ans:1 },
  { at: 57, type:'mc', section:null, q:'3. Approximately when did the earliest brains appear, according to the video?', opts:['250 million years ago','2 million years ago','500 million years ago','7 billion years ago'], ans:2 },
  { at: 110, type:'mc', section:null, q:'4. What made homo erectus different from earlier species?', opts:['They were the first to walk upright','They saw the world as something to be understood and transformed','They developed the largest brains in history','They were the first to live in large social groups'], ans:1 },
  { at: 195, type:'mc', section:null, q:'5. What happened in 1997 that shocked the world?', opts:['An AI drove a robot on Mars','An AI began recommending YouTube videos','An AI defeated the world chess champion','An AI identified faces with 97% accuracy'], ans:2 },
  { at: 250, type:'mc', section:null, q:'6. What does the video say about how self-learning neural networks improve themselves?', opts:['Programmers manually update their rules after each failure','They use machine learning techniques to write and improve their own code','Scientists model them directly on human brain scans','They learn exclusively by copying human behaviour'], ans:1 },
  { at: 315, type:'mc', section:null, q:'7. What does the speaker describe as "scary" about modern neural networks?', opts:['They are already faster than humans at every task','We do not fully understand what happens inside them','They have already replaced millions of jobs','They can access any data on the internet'], ans:1 },
  { at: 420, type:'mc', section:null, q:'8. What key limitation does the video say ChatGPT still has?', opts:['It can only work in English','It does not truly understand what it writes','It cannot summarise or translate text','It is slower than earlier AI systems'], ans:1 },
  { at: 545, type:'mc', section:null, q:'9. What could a million copies of AGI potentially achieve, according to the video?', opts:['Replace every human government within a decade','Solve fundamental scientific questions such as dark energy and ageing','Guarantee world peace through surveillance','Give every person on Earth equal access to wealth'], ans:1 },
  { at: 615, type:'mc', section:null, q:'10. What could trigger an "intelligence explosion" according to the video?', opts:['Humans upgrading their own biological brains','The internet connecting all computers globally','AGI becoming smart enough to improve AI research on its own','Governments investing unlimited money in computing power'], ans:2 },
  { at: 42, type:'tfng', section:'Part B — True / False / Not given', q:'11. The video says that for most animals, a narrow intelligence was enough for survival.', opts:['True','False','Not given'], ans:'True' },
  { at: 110, type:'tfng', section:null, q:'12. Homo sapiens emerged approximately 250,000 years ago.', opts:['True','False','Not given'], ans:'True' },
  { at: 165, type:'tfng', section:null, q:'13. The video states that progress in AI research was always continuous with no pauses.', opts:['True','False','Not given'], ans:'False' },
  { at: 250, type:'tfng', section:null, q:'14. In 2018, a self-learning AI taught itself chess in four hours by playing against itself.', opts:['True','False','Not given'], ans:'True' },
  { at: 330, type:'tfng', section:null, q:'15. The video claims ChatGPT scored the highest ever result on every individual benchmark.', opts:['True','False','Not given'], ans:'False' },
  { at: 440, type:'tfng', section:null, q:'16. The video mentions a specific law passed by a government to regulate AGI development.', opts:['True','False','Not given'], ans:'Not given' },
  { at: 530, type:'tfng', section:null, q:'17. According to the video, AGI could theoretically be copied and run as multiple parallel instances.', opts:['True','False','Not given'], ans:'True' },
  { at: 620, type:'tfng', section:null, q:'18. The video says human cognitive software has improved significantly since early homo sapiens.', opts:['True','False','Not given'], ans:'False' }
];

let current = 0;
let score = 0;
let timerInterval = null;
let timeLeft = TIMER;
let answered = false;
let player = null;
let playerReady = false;
let pendingSeek = null;

function loadYTAPI() {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

window.onYouTubeIframeAPIReady = function() {
  player = new YT.Player('yt-frame', {
    videoId: VID,
    playerVars: { controls: 1, rel: 0, modestbranding: 1, enablejsapi: 1 },
    events: {
      onReady: () => {
        playerReady = true;
        if (pendingSeek !== null) { seekAndPlay(pendingSeek); pendingSeek = null; }
      },
      onStateChange: (e) => {
        if (e.data === YT.PlayerState.PLAYING && !answered && current < questions.length) {
          monitorPlayback();
        }
      }
    }
  });
};

let monitorId = null;
function monitorPlayback() {
  if (monitorId) clearInterval(monitorId);
  monitorId = setInterval(() => {
    if (!player || !playerReady) return;
    const t = player.getCurrentTime();
    const q = questions[current];
    if (t >= q.at && !answered) {
      clearInterval(monitorId);
      player.pauseVideo();
      showQuestion(current);
    }
  }, 300);
}

function seekAndPlay(t) {
  if (!playerReady) { pendingSeek = t; return; }
  player.seekTo(Math.max(0, t - 3), true);
  player.playVideo();
}

function showQuestion(idx) {
  const q = questions[idx];
  answered = false;
  timeLeft = TIMER;
  updateProgress();
  const area = document.getElementById('q-area');

  let sectionHtml = '';
  if (q.section) sectionHtml = `<div class="section-label">${q.section}</div>`;

  let inputHtml = '';
  if (q.type === 'mc') {
    const letters = ['A','B','C','D'];
    inputHtml = `<div class="options" id="inp-opts">` +
      q.opts.map((o,i) => `<button class="opt-btn" data-i="${i}"><span class="ltr">${letters[i]}</span><span>${o}</span></button>`).join('') +
      `</div>`;
  } else {
    inputHtml = `<div class="tfng-row" id="inp-opts">` +
      q.opts.map(o => `<button class="tfng-btn" data-v="${o}">${o}</button>`).join('') +
      `</div>`;
  }

  area.innerHTML = `
    ${sectionHtml}
    <div class="q-card">
      <div class="q-meta">Question ${idx + 1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="timer-row">
        <span class="timer-num" id="timer-num">${TIMER}</span>
        <div class="timer-bar-bg"><div class="timer-bar-fill" id="timer-fill" style="width:100%"></div></div>
      </div>
      ${inputHtml}
      <div id="result-msg"></div>
      <div id="resume-area"></div>
    </div>
  `;

  if (q.type === 'mc') {
    document.querySelectorAll('.opt-btn').forEach(btn => {
      btn.addEventListener('click', () => { if (!answered) selectAnswer(parseInt(btn.dataset.i)); });
    });
  } else {
    document.querySelectorAll('.tfng-btn').forEach(btn => {
      btn.addEventListener('click', () => { if (!answered) selectAnswer(btn.dataset.v); });
    });
  }

  startTimer(idx);
}

function startTimer(idx) {
  if (timerInterval) clearInterval(timerInterval);
  timeLeft = TIMER;
  timerInterval = setInterval(() => {
    timeLeft--;
    const num = document.getElementById('timer-num');
    const fill = document.getElementById('timer-fill');
    if (!num) { clearInterval(timerInterval); return; }
    num.textContent = timeLeft;
    fill.style.width = Math.round((timeLeft / TIMER) * 100) + '%';
    if (timeLeft <= 5) { num.classList.add('urgent'); fill.classList.add('urgent'); }
    if (timeLeft <= 0) { clearInterval(timerInterval); timeUp(idx); }
  }, 1000);
}

function selectAnswer(val) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  const q = questions[current];
  const isCorrect = (val === q.ans);
  if (isCorrect) score++;

  if (q.type === 'mc') {
    document.querySelectorAll('.opt-btn').forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.ans) btn.classList.add('show-correct');
      if (i === val) { btn.classList.remove('selected'); btn.classList.add(isCorrect ? 'correct' : 'wrong'); }
    });
  } else {
    document.querySelectorAll('.tfng-btn').forEach(btn => {
      btn.disabled = true;
      if (btn.dataset.v === q.ans) btn.classList.add('show-correct');
      if (btn.dataset.v === val) { btn.classList.remove('selected'); btn.classList.add(isCorrect ? 'correct' : 'wrong'); }
    });
  }

  const msg = document.getElementById('result-msg');
  msg.className = 'result-msg ' + (isCorrect ? 'correct' : 'wrong');
  msg.textContent = isCorrect ? 'Correct!' : 'Incorrect. The correct answer is highlighted in green.';

  showResumeBtn();
}

function timeUp(idx) {
  if (answered) return;
  answered = true;
  const q = questions[idx];
  if (q.type === 'mc') {
    document.querySelectorAll('.opt-btn').forEach((btn, i) => { btn.disabled = true; if (i === q.ans) btn.classList.add('show-correct'); });
  } else {
    document.querySelectorAll('.tfng-btn').forEach(btn => { btn.disabled = true; if (btn.dataset.v === q.ans) btn.classList.add('show-correct'); });
  }
  const msg = document.getElementById('result-msg');
  msg.className = 'result-msg timeout';
  msg.textContent = 'Time\'s up! The correct answer is highlighted in green.';
  showResumeBtn();
}

function showResumeBtn() {
  const area = document.getElementById('resume-area');
  const isLast = current === questions.length - 1;
  const btn = document.createElement('button');
  btn.className = 'resume-btn';
  btn.textContent = isLast ? 'See final score' : 'Resume video \u25B6';
  btn.addEventListener('click', () => {
    current++;
    if (current >= questions.length) { showFinal(); return; }
    updateProgress();
    document.getElementById('q-area').innerHTML = `<p class="waiting-msg">Watch the video — the next question will appear automatically.</p>`;
    seekAndPlay(questions[current].at - 3);
  });
  area.appendChild(btn);
}

function updateProgress() {
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `Question ${Math.min(current + 1, questions.length)} of ${questions.length}`;
}

function showFinal() {
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-label').textContent = 'Complete';
  const pct = Math.round((score / questions.length) * 100);
  let feedback = pct >= 75 ? 'Excellent work — strong comprehension of the video.' : pct >= 50 ? 'Good effort. Review the sections you found tricky.' : 'Keep practising. Try watching the video again and retake the test.';
  document.getElementById('q-area').innerHTML = `
    <div class="final-card">
      <div class="final-score">${score} / ${questions.length}</div>
      <div class="final-sub">${pct}% — ${feedback}</div>
    </div>
  `;
}

loadYTAPI();
document.getElementById('q-area').innerHTML = `<p class="waiting-msg">Press play to start. Questions will appear automatically at the right moment in the video.</p>`;
updateProgress();
</script>
