<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; font-family: 'Nunito', sans-serif; }
.card { background: #1a1a2e; border-radius: 20px; padding: 2.5rem 2rem; max-width: 580px; width: 100%; border: 2px solid #ff6b35; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; border-radius: 50%; background: #ff6b35; opacity: 0.07; }
.title { font-size: 26px; font-weight: 800; color: #ff6b35; margin-bottom: 0.5rem; }
.subtitle { font-size: 14px; color: #a0a8c0; margin-bottom: 2rem; line-height: 1.6; }
.btn-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
.score-btn { padding: 12px 20px; border-radius: 50px; border: 1.5px solid #2e2e4a; background: #12122a; cursor: pointer; font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif; text-align: left; display: flex; align-items: center; gap: 12px; }
.score-btn:hover { border-color: #ff6b35; background: #1e1e3a; }
.score-btn.active { border-color: #ffd700; background: #1e1e0a; }
.score-label { font-size: 15px; font-weight: 800; color: #ffd700; min-width: 48px; }
.score-desc { color: #a0a8c0; font-size: 13px; }
.bubble { background: #12122a; border: 1.5px solid #3e2e6e; border-radius: 14px; padding: 1rem 1.25rem; font-size: 14px; line-height: 1.8; color: #c8c0e0; display: none; margin-top: 1rem; }
.bubble.show { display: block; }
.speaker { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: #ff6b35; margin-bottom: 6px; }
.nav-link { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: #2e2e4a; color: #a0a8c0; border-radius: 50px; font-size: 13px; font-weight: 700; text-decoration: none; margin-top: 1.5rem; border: 1px solid #3e3e6e; }
.nav-link:hover { background: #3e3e5e; }
</style>
</head>
<body>
<div class="card">
  <div class="title">How did you do?</div>
  <div class="subtitle">Select your score range and Mak will evaluate your future career options.</div>

  <div class="btn-grid">
    <button class="score-btn" data-score="50" onclick="showResult(this)">
      <span class="score-label">&lt;50%</span><span class="score-desc">Below 50%</span>
    </button>
    <button class="score-btn" data-score="60" onclick="showResult(this)">
      <span class="score-label">&lt;60%</span><span class="score-desc">50% – 59%</span>
    </button>
    <button class="score-btn" data-score="70" onclick="showResult(this)">
      <span class="score-label">&lt;70%</span><span class="score-desc">60% – 69%</span>
    </button>
    <button class="score-btn" data-score="80" onclick="showResult(this)">
      <span class="score-label">&lt;80%</span><span class="score-desc">70% – 79%</span>
    </button>
    <button class="score-btn" data-score="90" onclick="showResult(this)">
      <span class="score-label">&lt;90%</span><span class="score-desc">80% – 89%</span>
    </button>
    <button class="score-btn" data-score="95" onclick="showResult(this)">
      <span class="score-label">&lt;95%</span><span class="score-desc">90% – 94%</span>
    </button>
    <button class="score-btn" data-score="100" onclick="showResult(this)">
      <span class="score-label">100%</span><span class="score-desc">Perfect score</span>
    </button>
  </div>

  <div class="bubble" id="response-bubble">
    <div class="speaker">Mak (allegedly)</div>
    <span id="response-text"></span>
  </div>

  <br>
  <a class="nav-link" href="index.html">&#8592; Back to welcome</a>
</div>

<script>
var responses = {
  "50":  "Malfunction in Mak.sys detected. Slapping imminent. I wonder if being a male nurse in Germany is an interesting profession?",
  "60":  "Barely functional. Slapping barely avoided. Had a rough night? What's her name?",
  "70":  "Mediocrity detected. Getting those KPIs in a call center is going to be fun! Have you tried restarting the router, sir?",
  "80":  "You know that the QA testers are not really a thing anymore, right?",
  "90":  "Working as a general practitioner in an ER has its merits. Sometimes people don't yell if they're super sick.",
  "95":  "Specializing in gastroenterology has its merits. You can almost always tell what the person had for dinner.",
  "100": "Fun fact about surgeons is that most of them exhibit psychopathic traits. You should get tested. Or run for office. Both work."
};

function showResult(btn) {
  document.querySelectorAll('.score-btn').forEach(function(b) {
    b.classList.remove('active');
  });
  btn.classList.add('active');

  var score = btn.getAttribute('data-score');
  var text = responses[score];
  var bubble = document.getElementById('response-bubble');
  var el = document.getElementById('response-text');

  bubble.classList.add('show');
  el.textContent = '';

  var i = 0;
  var interval = setInterval(function() {
    el.textContent += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 28);
}
</script>
</body>
</html>
